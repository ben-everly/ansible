- name: install apt packages
  become: true
  apt:
    name:
      - universal-ctags
      - libfuse2
    state: latest
    update_cache: true

- name: register github api for neovim latest release
  uri:
    url: https://api.github.com/repos/neovim/neovim/releases/latest
  register: neovim

- name: download nvim appimage
  get_url:
    url: "{{ neovim.json.assets | selectattr('name', 'equalto', 'nvim-linux-x86_64.appimage') | map(attribute='browser_download_url') | first }}"
    dest: $HOME/.local/bin/nvim
    mode: "755"

- name: install pip packages
  pip:
    name: pynvim
    state: latest
    executable: $HOME/.asdf/shims/pip

- name: install pip2 packages
  pip:
    name: pynvim
    state: latest
    executable: $HOME/.asdf/shims/pip2

- name: install ruby packages
  gem:
    name: neovim
    state: latest
    executable: $HOME/.asdf/shims/gem

- name: install node neovim package
  npm:
    name: "{{ item }}"
    global: true
    state: latest
    executable: $HOME/.asdf/shims/npm
  with_items:
    - neovim
    - yarn
    - tree-sitter-cli

- name: install cpan packages
  cpanm:
    name: "{{ item }}"
    notest: true
    executable: $HOME/.asdf/shims/cpanm
  with_items:
    - Neovim::Ext
    - App::cpanminus
